# This is a basic workflow to help you get started with Actions
name: SM8150 Xiaomi Pad5

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
    paths:
      - 'Platforms/SurfaceDuo1Pkg/Device/xiaomi-nabu/**'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Indicate that we are running in CI
env:
  WM_CI_BUILD: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      
      # [NABU-HACK] SİBER SİLAH ENJEKSİYON ADIMI
      - name: Build SB/NOSB uefi for xiaomi pad 5.
        run: |
          # 1. Önce ortamı ve Submodule'leri hazırla (Orijinal dosyalar insin)
          bash scripts/ci_setup.sh
          
          # 2. HAYALET ENJEKSİYON: Orijinal dosyaların üzerine kabus gibi çök!
          echo "========================================================="
          echo "💀 [NABU-HACK] HAYALET ENJEKSIYON BASLIYOR 💀"
          
          curl -L -o Common/MU_TIANO/EmbeddedPkg/Drivers/DtPlatformDxe/DtPlatformDxe.c "https://github.com/BilalDaldal/mu_aloha_platforms/raw/refs/heads/main/Features/DtPlatformDxe.c"
          curl -L -o Common/MU_TIANO/EmbeddedPkg/Drivers/DtPlatformDxe/DtPlatformDxe.inf "https://github.com/BilalDaldal/mu_aloha_platforms/raw/refs/heads/main/Features/DtPlatformDxe.inf"
          
          # ---------------------------------------------------------
          # 3. ZORLA DERLEME EMRİ (BUNU EKLEMEZSEK SİLAH ÇALIŞMAZ!)
          # ---------------------------------------------------------
          echo "  Common/MU_TIANO/EmbeddedPkg/Drivers/DtPlatformDxe/DtPlatformDxe.inf" >> Platforms/SurfaceDuo1Pkg/SurfaceDuo1.dsc
          echo "INF Common/MU_TIANO/EmbeddedPkg/Drivers/DtPlatformDxe/DtPlatformDxe.inf" >> Platforms/SurfaceDuo1Pkg/Device/xiaomi-nabu/DXE.inc
          
          echo "[NABU-HACK] Zehirli payload basariyla matrise gömüldü ve VIP listesine eklendi!"
          echo "========================================================="
          
          # 4. Derlemeyi başlat (Derleyici artık zorla bizim kodumuzu da derleyecek!)
          ./build_uefi.py -d xiaomi-nabu

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uefi-images-nabu
          path: Build/*/ci_artifacts
          compression-level: 9
